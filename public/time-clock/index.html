<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AiKang Care Center — Time Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#E9EFF6;--panel:#FBFCFE;--ink:#0B2647;--muted:#5C6E86;--teal:#0C5E96;--teal-d:#084B79;--teal-l:#E1ECF6;--navy:#0B2C57;--navy-d:#07203F;
--green:#1E8E5A;--green-l:#E1F2E9;--amber:#C77A1A;--amber-l:#FBEBD3;--red:#B5443A;--red-l:#F6E2DF;--violet:#6C4FB8;--violet-l:#ECE6F8;
--line:#E0D9CC;--shadow:0 10px 30px rgba(27,43,42,.10);--r:18px;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:radial-gradient(1200px 600px at 82% -12%,#F2F6FB 0%,transparent 60%),radial-gradient(900px 520px at -10% 112%,#E2EEF1 0%,transparent 55%),var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:1080px;margin:0 auto;padding:22px 18px 60px}
.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:52px;height:52px;border-radius:14px;background:#fff;display:grid;place-items:center;box-shadow:var(--shadow);padding:6px;border:1px solid var(--line)}
.logo img{width:100%;height:100%;object-fit:contain}
.brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:20px;letter-spacing:-.01em;line-height:1}
.brand p{font-size:12px;color:var(--muted);margin-top:3px}
.brandlogo{height:50px;width:auto;display:block}
td.f1{background:#E8F1FF}td.f2{background:#FDE9F3}
.plwrap{display:flex;align-items:center;gap:3px}
.fdot{font-size:9px;font-weight:800;border:none;border-radius:5px;padding:2px 4px;cursor:pointer;color:#0B2647;line-height:1}
.fdot.fhide{display:none}
.fdot.f1{background:#9CC3FF}.fdot.f2{background:#F8A6CE}
.flegend{display:inline-flex;gap:14px;align-items:center;font-size:12px;color:var(--muted)}
.flegend i{display:inline-block;width:13px;height:13px;border-radius:3px;vertical-align:-2px;margin-right:5px}
.fbadge{font-size:10px;font-weight:800;border-radius:5px;padding:1px 5px;color:#0B2647}
.fbadge.f1{background:#9CC3FF}.fbadge.f2{background:#F8A6CE}
.duty{display:inline-block;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:2px 7px;font-size:12px;font-weight:600;margin:2px 1px}
.rgrid td[data-edit]{position:relative;cursor:pointer}
.rgrid td[data-edit]:hover{outline:2px solid var(--teal);outline-offset:-2px}
.chgdot{position:absolute;top:1px;right:1px;width:6px;height:6px;border-radius:50%;background:var(--amber)}
.linklike{background:none;border:0;color:var(--teal);font-weight:700;cursor:pointer;padding:0;font-size:inherit;text-decoration:underline;text-underline-offset:2px}
.linklike:hover{color:var(--navy)}
.algrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:8px}
.alcard{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
.alcard .av{width:34px;height:34px;border-radius:9px;background-size:cover;background-position:center;display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff;background-color:var(--navy)}
.alcard .av.ph{background:linear-gradient(145deg,var(--navy),var(--teal))}
.alcard .alinfo{min-width:0;flex:1}
.alcard .aln{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alcard .alsub{font-size:10.5px;color:var(--muted)}
.alcard .alv{font-weight:800;font-size:20px;line-height:1;text-align:center}
.alcard .alv span{display:block;font-size:9px;font-weight:600;color:var(--muted)}
.tagline{font-size:12.5px;font-weight:600;color:var(--muted);border-left:1px solid var(--line);padding-left:12px;letter-spacing:.02em}
.clock{font-family:'Spline Sans Mono',monospace;text-align:right}
.clock .t{font-size:30px;font-weight:500;letter-spacing:.02em;line-height:1}
.clock .d{font-size:12.5px;color:var(--muted);margin-top:3px}
.modebtn{border:1px solid var(--line);background:var(--panel);color:var(--muted);font-family:inherit;font-size:12.5px;font-weight:600;padding:9px 14px;border-radius:11px;cursor:pointer;transition:.15s}
.modebtn:hover{border-color:var(--teal);color:var(--teal)}
.modebtn{position:relative}
.modebtn[data-notif]:not([data-notif=""]):after{content:attr(data-notif);position:absolute;top:-7px;right:-7px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:grid;place-items:center;padding:0 4px}
.tabnotif{display:inline-block;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:9px;padding:1px 6px;margin-left:5px}
.lead{margin:6px 2px 14px}
.lead h2{font-family:'Fraunces',serif;font-weight:600;font-size:23px;letter-spacing:-.01em}
.lead p{color:var(--muted);font-size:13.5px;margin-top:3px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(184px,1fr));gap:13px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;cursor:pointer;position:relative;transition:.16s;overflow:hidden}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:#cfe6e6}
.card .nm{font-weight:700;font-size:15px;letter-spacing:-.01em;line-height:1.15}
.chead{display:flex;align-items:center;gap:10px}
.cmeta{min-width:0}
.avatar{width:42px;height:42px;border-radius:12px;flex-shrink:0;background-size:cover;background-position:center;display:grid;place-items:center;font-weight:700;font-size:14px;color:#fff;background-color:var(--navy)}
.avatar.ph{background:linear-gradient(145deg,var(--navy),var(--teal))}
.cal{font-size:11.5px;color:var(--muted);margin-top:7px;padding-top:7px;border-top:1px solid var(--line)}
.avatarLg{width:64px;height:64px;border-radius:14px;background-size:cover;background-position:center;display:grid;place-items:center;font-weight:700;font-size:20px;color:#fff;background:linear-gradient(145deg,var(--navy),var(--teal));flex-shrink:0}
.card .ro{font-size:11px;color:var(--muted);margin-top:1px;text-transform:uppercase;letter-spacing:.05em}
.card .sched{margin-top:9px;font-size:11.5px;color:var(--muted)}
.card .sched b{color:var(--ink);font-family:'Spline Sans Mono',monospace;font-weight:500}
.card .st{margin-top:9px;display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600}
.dotg{width:9px;height:9px;border-radius:50%;background:#c4cdcb}
.in .dotg{background:var(--green);box-shadow:0 0 0 4px var(--green-l)}
.in{border-color:#bfe6d3}.in:after{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:var(--green)}
.card .since{font-family:'Spline Sans Mono',monospace;color:var(--muted);font-weight:500}
.pill{position:absolute;top:13px;right:13px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.pill.on{background:var(--green-l);color:var(--green)}.pill.off{background:#eee9df;color:var(--muted)}
.pill.leave{background:var(--amber-l);color:var(--amber)}.pill.done{background:var(--teal-l);color:var(--teal-d)}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.b-al{background:var(--amber-l);color:var(--amber)}.b-mc{background:var(--red-l);color:var(--red)}
.b-ph{background:#E3F0DA;color:#4d7a2e}.b-upl{background:#eee9df;color:var(--muted)}.b-off{background:#eee9df;color:var(--muted)}
.b-late{background:var(--red-l);color:var(--red)}.b-ok{background:var(--green-l);color:var(--green)}
.scrim{position:fixed;inset:0;background:rgba(20,32,31,.45);backdrop-filter:blur(3px);display:none;place-items:center;z-index:50;padding:18px}
.scrim.show{display:grid}
.modal{background:var(--panel);border-radius:24px;width:340px;max-width:100%;padding:24px;box-shadow:0 30px 70px rgba(0,0,0,.3);animation:pop .2s ease}
@keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{font-family:'Fraunces',serif;font-size:21px;font-weight:600;text-align:center}
.modal .sub{text-align:center;color:var(--muted);font-size:13px;margin-top:3px}
.dots{display:flex;justify-content:center;gap:13px;margin:20px 0 6px}
.dots i{width:14px;height:14px;border-radius:50%;border:2px solid #cdd6d4;transition:.12s}
.dots i.f{background:var(--teal);border-color:var(--teal)}
.dots.err i{border-color:var(--red);animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.msg{height:18px;text-align:center;font-size:12.5px;font-weight:600;color:var(--red);margin-bottom:6px}
.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.key{font-family:'Spline Sans Mono',monospace;font-size:22px;font-weight:500;padding:15px 0;border-radius:14px;border:1px solid var(--line);background:#fff;cursor:pointer;transition:.1s;color:var(--ink)}
.key:hover{background:var(--teal-l);border-color:var(--teal)}.key:active{transform:scale(.95)}
.key.fn{font-family:'Plus Jakarta Sans';font-size:13px;font-weight:600;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(140px);background:var(--ink);color:#fff;padding:14px 20px;border-radius:14px;font-weight:600;font-size:14px;box-shadow:0 16px 40px rgba(0,0,0,.3);z-index:60;transition:.3s cubic-bezier(.2,.8,.2,1);display:flex;align-items:center;gap:11px;max-width:90%}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast .ic{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;font-size:14px}
.toast.green .ic{background:var(--green)}.toast.grey .ic{background:#5d6b69}.toast.amber .ic{background:var(--amber)}
.admin{display:none}
.tabs{display:flex;gap:6px;margin:16px 0;flex-wrap:wrap}
.tab{border:1px solid var(--line);background:var(--panel);padding:9px 14px;border-radius:11px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.panel h3{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin-bottom:4px}
.panel .hint{color:var(--muted);font-size:12.5px;margin-bottom:14px;line-height:1.5}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:8px 9px;border-bottom:1px solid var(--line)}
td{padding:7px 9px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
input,select{font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);width:100%}
input:focus,select:focus{outline:none;border-color:var(--teal)}
.btn{font-family:inherit;font-weight:600;font-size:13px;padding:9px 15px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--navy),var(--teal));color:#fff;cursor:pointer;transition:.15s}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}.btn.ghost:hover{border-color:var(--teal);color:var(--teal)}
.btn.danger{background:transparent;color:var(--red);border:1px solid #e6cdc9;padding:6px 11px;font-size:12px}
.btn.sm{padding:6px 11px;font-size:12px}
.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:6px}
.kpi .k{background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px 14px}
.kpi .k .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.kpi .k .v{font-family:'Spline Sans Mono',monospace;font-size:22px;font-weight:500;margin-top:3px}
.mono{font-family:'Spline Sans Mono',monospace}.ot{color:var(--amber);font-weight:600}
.note{font-size:12px;color:var(--muted);margin-top:12px;line-height:1.6}
.rgrid{overflow-x:auto}.rgrid table{min-width:760px;font-size:11px}
.rgrid td,.rgrid th{padding:4px 5px;text-align:center}.rgrid td.nm{text-align:left;font-weight:600;white-space:nowrap}
.cellcode{font-family:'Spline Sans Mono',monospace;font-weight:600;font-size:10.5px;padding:2px 5px;border-radius:5px}
.c-work{background:var(--teal-l);color:var(--teal-d)}.c-night{background:var(--violet-l);color:var(--violet)}
.c-off{color:var(--muted)}.c-al{background:var(--amber-l);color:var(--amber)}.c-mc{background:var(--red-l);color:var(--red)}.c-ph{background:#E3F0DA;color:#4d7a2e}
@media(max-width:560px){.clock .t{font-size:24px}.brand h1{font-size:17px}}
.plcell{width:56px;text-align:center;padding:5px 4px}
.plcell.reqflag{border-color:var(--amber)!important;box-shadow:0 0 0 2px var(--amber-l)}
#reqModal{width:360px}#reqBody h3{font-family:'Fraunces',serif;font-size:21px;font-weight:600;text-align:center}
#reqBody .sub{text-align:center;color:var(--muted);font-size:13px;margin-top:3px}
.adminH4{font-family:'Fraunces',serif;font-size:14.5px;margin:16px 0 7px;font-weight:600}
</style><script id="kv-bridge">
(function(){
  var KEYS = ['ak_roster','ak_staff','ak_floors','ak_rosterlog','ak_records','ak_settings','ak_audit','ak_requests'];
  window.__kvPrefetch = (async function(){
    for(var k of KEYS){
      try{
        var r = await fetch('/api/kv?k='+encodeURIComponent(k));
        if(!r.ok) continue;
        var d = await r.json();
        if(d.value != null) localStorage.setItem(k, d.value);
      }catch(e){}
    }
  })();
  var _set = Storage.prototype.setItem;
  Storage.prototype.setItem = function(k,v){
    _set.call(this,k,v);
    if(KEYS.indexOf(k)>=0){
      fetch('/api/kv',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({k:k,v:v})}).catch(function(){});
    }
  };
})();
</script>
</head>

const LEAVE={L:'OFF',LR:'OFF',AL:'ANNUAL LEAVE',ALR:'ANNUAL LEAVE',MC:'MEDICAL',EL:'EMERGENCY LEAVE',PH:'PUBLIC HOLIDAY',UPL:'UNPAID',PM:'OFF'};

/* parse "X-Y" generic -> {in,out} 24h; AM/N fixed 12h */
function expected(code){
  if(!code||isLeave(code))return null;
  if(code==='AM')return{in:settings.amIn,out:settings.amOut};
  if(code==='N')return{in:settings.nIn,out:settings.nOut,overnight:true};
  const m=code.match(/^(\d{1,2})-(\d{1,2})$/);
  if(m){let h1=+m[1],h2=+m[2];if(h2<=h1&&h2<12)h2+=12;return{in:String(h1).padStart(2,'0')+':00',out:String(h2).padStart(2,'0')+':00'};}
  return null;
}

function rawHours(r){if(!r.outISO)return 0;return Math.max(0,(new Date(r.outISO)-new Date(r.inISO))/3600000);}
function hours(r){let h=rawHours(r);if(settings.breakMin>0&&h>settings.breakAfter)h-=settings.breakMin/60;return Math.max(0,h);}
function roundISO(iso,step){if(!iso||!step)return iso;const d=new Date(iso);const ms=step*60000;return new Date(Math.round(d.getTime()/ms)*ms).toISOString();}
function nudge(iso,min){return new Date(new Date(iso).getTime()+min*60000).toISOString();}
function mondayKey(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setHours(0,0,0,0);x.setDate(x.getDate()-day);return x;}
function weekLabel(mk){const e=new Date(mk);e.setDate(e.getDate()+6);return mk.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+e.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function recDateISO(r){const d=new Date(r.inISO);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function renderGrid(){
 const g=document.getElementById('staffGrid');g.innerHTML='';const iso=todayISO();
 activeStaff().forEach(s=>{
   const open=openRec(s.name);const code=schedFor(s.name,iso);const exp=expected(code);
   let schedLine,pill;
   if(isLeave(code)){const[c,l]=leaveBadge(code);schedLine=`<span class="badge ${c}">${LEAVE[code]}</span>`;pill=`<span class="pill leave">${l}</span>`;}
   else if(exp){const f=floorOf(s.name,iso);schedLine=`Scheduled <b>${code}</b> · <b>${exp.in}–${exp.out}</b> <span class="fbadge ${f===2?'f2':'f1'}">${f===2?'2nd flr':'1st flr'}</span>`;pill='';}
   else{schedLine='No shift scheduled';pill='';}
   const doneToday=records.some(r=>r.name===s.name&&r.outISO&&recDateISO(r)===iso);
   if(open)pill='<span class="pill on">In</span>';
   else if(doneToday&&!isLeave(code))pill='<span class="pill done">Done</span>';
   else if(!pill)pill='<span class="pill off">Out</span>';
   const card=document.createElement('div');card.className='card'+(open?' in':'');
   let stLine = open?`Since <span class="since">${fmtT(open.inISO)}</span>`:(isLeave(code)?'Not expected today':'Not clocked in');
   const av=s.photo?`<span class="avatar" style="background-image:url('${s.photo}')"></span>`:`<span class="avatar ph">${initials(s)}</span>`;
   const a=alStats(s);const acol=a.bal<0?'var(--red)':(a.bal<=2?'var(--amber)':'var(--green)');
   card.innerHTML=`${pill}<div class="chead">${av}<div class="cmeta"><div class="nm">${dispName(s)}</div><div class="ro">${s.position||s.role}</div></div></div>
     <div class="sched">${schedLine}</div><div class="st"><span class="dotg"></span>${stLine}</div>
     <div class="cal">Annual leave: <b style="color:${acol}">${a.bal}</b> of ${a.ent} left</div>`;
   card.onclick=()=>askPin(s);g.appendChild(card);
 });
}
let pinBuf='',pinTarget=null,pinMode='clock';
function askPin(s,mode='clock'){pinTarget=s;pinMode=mode;pinBuf='';
 const code=mode==='clock'?schedFor(s.name,todayISO()):'';
 document.getElementById('mTitle').textContent=mode==='admin'?'Admin PIN':(openRec(s.name)?'Clock OUT — '+s.name:'Clock IN — '+s.name);
 let sub=mode==='admin'?'Manager access':(s.role+' · enter your 4-digit PIN');
 if(mode==='clock'&&isLeave(code))sub='Note: roster shows '+LEAVE[code]+' today';
 document.getElementById('mSub').textContent=sub;
 document.getElementById('mMsg').textContent='';buildKeys();drawDots();document.getElementById('scrim').classList.add('show');}
function buildKeys(){const k=document.getElementById('keys');k.innerHTML='';
 ['1','2','3','4','5','6','7','8','9','C','0','✓'].forEach(t=>{const b=document.createElement('button');
   b.className='key'+(t==='C'||t==='✓'?' fn':'');b.textContent=t;b.onclick=()=>press(t);k.appendChild(b);});}
function drawDots(err){const d=document.getElementById('dots');d.className='dots'+(err?' err':'');[...d.children].forEach((i,x)=>i.className=x<pinBuf.length?'f':'');}
function press(t){if(t==='C'){pinBuf='';drawDots();return;}if(t==='✓'){submitPin();return;}
 if(pinBuf.length<4){pinBuf+=t;drawDots();if(pinBuf.length===4)setTimeout(submitPin,150);}}
function submitPin(){if(pinMode==='admin'){if(pinBuf===settings.adminPin){window._lvl='admin';closeModal();openAdmin();}else if(pinBuf===settings.managerPin){window._lvl='manager';closeModal();openAdmin();}else fail();return;}
 if(pinBuf===pinTarget.pin){doClock(pinTarget);closeModal();}else fail();}
function fail(){document.getElementById('mMsg').textContent='Wrong PIN — try again';drawDots(true);pinBuf='';setTimeout(drawDots,400);}
function closeModal(){document.getElementById('scrim').classList.remove('show');}
document.getElementById('scrim').onclick=e=>{if(e.target.id==='scrim')closeModal();};
function doClock(s){
 const open=openRec(s.name);
 if(open){open.outISO=NOW().toISOString();saveAll();renderGrid();toast(s.name+' clocked OUT · '+hours(open).toFixed(1)+'h',false);postClockPanel(s,'OUT');return;}
 const iso=todayISO();const code=schedFor(s.name,iso);const exp=expected(code);
 const now=NOW();let lateMin=0;
 if(exp){const[h,m]=exp.in.split(':');const sched=new Date(now);sched.setHours(+h,+m,0,0);lateMin=Math.round((now-sched)/60000);}
 records.push({name:s.name,inISO:now.toISOString(),outISO:null,sched:code,lateMin:exp?lateMin:null});
 saveAll();renderGrid();
 if(isLeave(code))toast(s.name+' clocked IN (roster: '+LEAVE[code]+')',true,'amber');
 else if(exp&&lateMin>settings.grace)toast(s.name+' clocked IN · late '+lateMin+' min',true,'amber');
 else toast(s.name+' clocked IN · on time',true);
 postClockPanel(s,'IN');
}
function postClockPanel(s,action){const body=document.getElementById('reqBody');if(!body)return;
 body.innerHTML=`<h3>${dispName(s)}</h3><div class="sub">Clocked ${action} ✓</div>
   <p class="hint" style="margin-top:12px">Anything to submit while you're here? It goes to the manager as a pending task.</p>
   <div style="display:grid;gap:10px"><button class="btn" id="pcReq">Submit a leave / MC / EL form</button>
     <button class="btn ghost sm" id="pcDone">No, I'm done</button></div>`;
 document.getElementById('pcReq').onclick=()=>reqStep2(s.name);
 document.getElementById('pcDone').onclick=closeReq;
 document.getElementById('reqScrim').classList.add('show');
}
let toT;function toast(m,green,kind){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=m;
 document.getElementById('toastIc').textContent=kind==='amber'?'!':(green?'✓':'⏻');
 t.className='toast show '+(kind||(green?'green':'grey'));clearTimeout(toT);toT=setTimeout(()=>t.className='toast',2800);}

/* weeks present in records */
function recWeeks(){const w={};records.filter(r=>r.outISO).forEach(r=>{const k=mondayKey(r.inISO).toISOString();(w[k]=w[k]||[]).push(r);});return w;}

function viewOT(){
 const weeks=recWeeks();const keys=Object.keys(weeks).sort();
 const opts=keys.map(k=>`<option value="${k}">${weekLabel(new Date(k))}</option>`).join('')||'<option>No records yet</option>';
 const sel=window._w&&keys.includes(window._w)?window._w:(keys[keys.length-1]||'');
 let body='<tr><td colspan="7" style="color:var(--muted)">No completed punches in this week yet.</td></tr>';
 let tH=0,tOT=0,tPay=0;
 if(sel){const byName={};weeks[sel].forEach(r=>byName[r.name]=(byName[r.name]||0)+hours(r));
  body=staff.filter(s=>byName[s.name]).map(s=>{const recs=weeks[sel].filter(r=>r.name===s.name);const h=byName[s.name];
   let ot;if(settings.otBasis==='daily'){ot=recs.reduce((a,r)=>a+(r.noOT?0:Math.max(0,hours(r)-settings.dailyThreshold)),0);}else{const otBase=recs.filter(r=>!r.noOT).reduce((a,r)=>a+hours(r),0);ot=Math.max(0,otBase-settings.otThreshold);}
   const reg=h-ot;const pay=ot*s.rate*settings.otMult;
   let phH=recs.filter(r=>schedFor(r.name,recDateISO(r))==='PH').reduce((a,r)=>a+hours(r),0);
   const phPay=phH*s.rate*settings.phMult;
   // scheduled hrs that week
   let sh=0;const mk=new Date(sel);for(let i=0;i<7;i++){const d=new Date(mk);d.setDate(d.getDate()+i);
     const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
     const e=expected(schedFor(s.name,iso));if(e){let[a,b1]=e.in.split(':').map(Number),[c,d1]=e.out.split(':').map(Number);let hh=(c+ (e.overnight?24:0))-a;if(hh<=0)hh+=24;sh+=hh;}}
   tH+=h;tOT+=ot;tPay+=pay;window._tPH=(window._tPH||0)+phPay;
   return `<tr><td><b>${s.name}</b></td><td>${s.role}</td><td class="mono" style="color:var(--muted)">${sh||'—'}</td><td class="mono">${h.toFixed(1)}</td>
    <td class="mono">${reg.toFixed(1)}</td><td class="mono ot">${ot.toFixed(1)}</td><td class="mono">${phH?settings.currency+' '+phH.toFixed(1):'—'}</td><td class="mono">${settings.currency} ${(pay+phPay).toFixed(2)}</td></tr>`;}).join('');}
 const totPH=window._tPH||0;window._tPH=0;
 return `<div class="panel"><h3>Weekly timesheet &amp; overtime</h3>
  <p class="hint">Actual hours from punches vs scheduled hours. OT basis: <b>${settings.otBasis==='daily'?('daily — over '+settings.dailyThreshold+'h/shift'):('weekly — over '+settings.otThreshold+'h/week')}</b>, paid at each staff's rate × ${settings.otMult}×. Public-holiday hours paid at × ${settings.phMult}×.</p>
  <div class="row" style="margin-bottom:14px"><label style="font-size:12.5px;color:var(--muted)">Week:</label><select id="wSel" style="width:auto">${opts}</select></div>
  <div class="kpi"><div class="k"><div class="l">Actual hrs</div><div class="v">${tH.toFixed(1)}</div></div>
   <div class="k"><div class="l">OT hrs</div><div class="v ot">${tOT.toFixed(1)}</div></div>
   <div class="k"><div class="l">OT pay</div><div class="v">${settings.currency} ${tPay.toFixed(0)}</div></div>
   <div class="k"><div class="l">PH pay</div><div class="v">${settings.currency} ${totPH.toFixed(0)}</div></div></div>
  <table style="margin-top:12px"><thead><tr><th>Name</th><th>Role</th><th>Sched</th><th>Actual</th><th>Reg</th><th>OT</th><th>PH hrs</th><th>OT+PH pay</th></tr></thead><tbody>${body}</tbody></table>
  <div class="row" style="margin-top:14px"><button class="btn ghost sm" id="expOT">Export week (CSV)</button><button class="btn ghost sm" id="expPay">Export monthly payslips (CSV)</button></div></div>`;
}

function viewLeave(){
 // month range = all roster dates; count per staff
 const dates=Object.keys(ROSTER).sort();const today=todayISO();
 let rows=activeStaff().map(s=>{let off=0,al=0,mc=0,ph=0,upl=0,worked=0,absent=0,late=0;
   dates.forEach(iso=>{const code=schedFor(s.name,iso);if(!code)return;
     if(code==='L'||code==='LR'||code==='PM')off++;
     else if(code==='AL'||code==='ALR')al++;else if(code==='MC')mc++;else if(code==='PH')ph++;else if(code==='UPL')upl++;
     else{worked++; // scheduled to work
        if(isAbsent(s.name,iso))absent++;
        const rec=records.find(r=>r.name===s.name&&recDateISO(r)===iso&&r.lateMin!=null);
        if(rec&&rec.lateMin>settings.grace)late++;}});
   const al_=alStats(s);const balCol=al_.bal<0?'var(--red)':(al_.bal<=2?'var(--amber)':'var(--green)');
   return `<tr><td><b>${s.name}</b></td><td>${s.role}</td><td class="mono">${worked}</td>
     <td class="mono">${off}</td><td class="mono"><span class="badge b-al">${al}</span></td>
     <td class="mono"><span class="badge b-mc">${mc}</span></td><td class="mono"><span class="badge b-ph">${ph}</span></td>
     <td class="mono">${upl}</td><td class="mono" style="color:${absent?'var(--red)':'var(--muted)'}">${absent}</td>
     <td class="mono" style="color:${late?'var(--amber)':'var(--muted)'}">${late}</td>
     <td class="mono">${al_.ent}</td><td class="mono">${al_.taken}</td><td class="mono" style="color:${balCol};font-weight:600">${al_.bal}</td></tr>`;}).join('');
 return `<div class="panel"><h3>Leave &amp; absence summary</h3>
  <p class="hint">Read from the roster master. <b>Absent</b> = scheduled work day in the past with no clock-in. <b>Late</b> = clocked in >${settings.grace} min after start. <b>AL balance</b> = yearly entitlement minus annual-leave days taken (set entitlement per staff under Staff·PIN·Rate; staff under 2 years' service default to 10 days).</p>

  <div class="row" style="margin-top:14px"><button class="btn ghost sm" id="expLeave">Export (CSV)</button></div></div>`;
}

   <tr><td><b>Night shift</b> (start → end)</td><td><input type="time" id="setNIn" value="${settings.nIn}" style="width:96px"> → <input type="time" id="setNOut" value="${settings.nOut}" style="width:96px"></td></tr>
   <tr><td><b>Clock time adjust</b> (offset min)</td><td><div class="row"><input type="number" id="setOff" value="${settings.clockOffset}" style="width:84px"><button class="btn ghost sm" id="offM">−1m</button><button class="btn ghost sm" id="offP">+1m</button><button class="btn ghost sm" id="offZ">Sync to device</button></div></td></tr>
   <tr><td>Late grace (minutes)</td><td><input type="number" id="setGrace" value="${settings.grace}" style="width:100px"></td></tr>

   <tr><td><b>Manager PIN</b> (limited access)</td><td><input type="text" id="setMgr" value="${settings.managerPin}" maxlength="6" class="mono" style="width:100px"></td></tr>

function wire(v){
 if(v==='profiles'){const s=staff[window._profSel]||staff[0];
   document.querySelectorAll('[data-prof]').forEach(b=>b.onclick=()=>{window._profSel=+b.dataset.prof;renderAdmin('profiles');});
   document.getElementById('profSave').onclick=()=>{document.querySelectorAll('[data-pf]').forEach(inp=>{const k=inp.dataset.pf;s[k]=(k==='rate'||k==='alEntitle'||k==='floor')?(+inp.value||0):inp.value;});saveAll();logAudit('Edited profile: '+dispName(s));toast('Profile saved',true);renderAdmin('profiles');renderGrid();};
   document.getElementById('profPhoto').onchange=e=>{const f=e.target.files[0];if(!f)return;downscalePhoto(f,data=>{s.photo=data;saveAll();logAudit('Photo set: '+dispName(s));toast('Photo saved',true);renderAdmin('profiles');renderGrid();});};
   document.getElementById('profExport').onclick=()=>{const cols=['name',...PROF_FIELDS.map(f=>f[0])];const rows=[cols.map(c=>({name:'Key',fullname:'Full name',position:'Position',nric:'NRIC',dob:'DOB',gender:'Gender',race:'Race',religion:'Religion',nat:'Nationality',join:'Joined',academic:'Academic',marital:'Marital',phone:'Phone',addr:'Address',epf:'EPF',perkeso:'PERKESO',health:'Health',blood:'Blood',chronic:'Chronic',exp:'Experience',emName:'EmergencyName',emNo:'EmergencyNo',alEntitle:'AL/yr',rate:'Rate',pin:'PIN'}[c]||c))];staff.forEach(x=>rows.push(cols.map(c=>x[c]??'')));dl('aikang_employee_profiles.csv',rows);logAudit('Exported employee profiles');};
   document.getElementById('profReload').onclick=reloadFromRecord;
   document.getElementById('profAdd').onclick=()=>{const o={name:'New Staff',role:'PCA',rate:14,pin:'0000',join:'',alEntitle:10,payslips:[]};PROFILE_KEYS.forEach(k=>o[k]='');staff.push(o);window._profSel=staff.length-1;saveAll();renderAdmin('profiles');};
   document.getElementById('profDel').onclick=()=>{if(confirm('Delete '+dispName(s)+'? This removes their profile, PIN and attached payslips. Punch history stays.')){const nm=dispName(s);staff.splice(window._profSel,1);window._profSel=0;saveAll();logAudit('Deleted staff: '+nm);toast('Staff deleted',false);renderAdmin('profiles');renderGrid();}};
   document.getElementById('psAdd').onclick=()=>{const f=document.getElementById('psFile').files[0];if(!f){toast('Choose a file',false);return;}
     if(f.size>3.5*1024*1024){toast('File too large (max ~3.5 MB). Compress the PDF/image.',false);return;}
     const label=document.getElementById('psLabel').value.trim()||f.name;
     fileToData(f,data=>{try{if(!Array.isArray(s.payslips))s.payslips=[];s.payslips.push({label,data,type:f.type,added:todayISO()});saveAll();logAudit('Attached payslip ('+label+') · '+dispName(s));toast('Payslip attached',true);renderAdmin('profiles');}catch(e){toast('Storage full — remove old payslips/photos',false);}});};
   document.querySelectorAll('[data-psview]').forEach(b=>b.onclick=()=>authPayslips(()=>openPayslip(s.payslips[+b.dataset.psview])));
   document.querySelectorAll('[data-psdl]').forEach(b=>b.onclick=()=>authPayslips(()=>downloadData(s.payslips[+b.dataset.psdl])));
   document.querySelectorAll('[data-psdel]').forEach(b=>b.onclick=()=>{if(confirm('Delete this payslip?')){s.payslips.splice(+b.dataset.psdel,1);saveAll();logAudit('Deleted a payslip · '+dispName(s));renderAdmin('profiles');}});
   return;}
 if(v==='audit'){document.getElementById('expAudit').onclick=()=>{const rows=[['When','By','Action']];audit.forEach(a=>rows.push([fmtDT(a.t),a.lvl,a.action]));dl('aikang_audit.csv',rows);};
   document.getElementById('clrAudit').onclick=()=>{if(confirm('Clear the audit log?')){audit=[];LS.set('ak_audit',audit);renderAdmin('audit');}};return;}
 if(v==='planning'){
   recalcPlan();
   document.querySelectorAll('.plcell').forEach(inp=>inp.oninput=()=>{planCellRefresh(inp);recalcPlan();});
   document.querySelectorAll('[data-fl]').forEach(b=>b.onclick=()=>{const p=b.dataset.fl.split('|');const nf=floorOf(p[0],p[1])===1?2:1;setFloor(p[0],p[1],nf);
     b.textContent=nf===2?'2F':'1F';b.classList.toggle('f1',nf===1);b.classList.toggle('f2',nf===2);
     const inp=b.closest('td').querySelector('.plcell');planCellRefresh(inp);recalcPlan();logAudit('Floor set '+nf+'F · '+p[0]+' '+p[1]);});
   const goWk=iso=>{window._planWeek=isoOf(mondayKey(new Date(iso)));renderAdmin('planning');};
   const shift=n=>{const d=new Date(window._planWeek);d.setDate(d.getDate()+n);goWk(isoOf(d));};
   document.getElementById('planPrev').onclick=()=>shift(-7);
   document.getElementById('planNext').onclick=()=>shift(7);
   document.getElementById('planThis').onclick=()=>goWk(isoOf(mondayKey(NOW())));
   document.getElementById('planDate').onchange=e=>goWk(e.target.value);
   document.getElementById('planLoad').onclick=()=>goWk(document.getElementById('planDate').value);
   document.getElementById('planCopy').onclick=()=>{document.querySelectorAll('.plcell').forEach(inp=>{const p=inp.dataset.pl.split('|');const d=new Date(p[1]);d.setDate(d.getDate()-7);inp.value=schedFor(p[0],isoOf(d));});recalcPlan();toast('Copied previous week — review & Save',true);};
   document.getElementById('planSave').onclick=()=>{let ch=0;document.querySelectorAll('.plcell').forEach(inp=>{const p=inp.dataset.pl.split('|');if(setRosterCell(p[0],p[1],inp.value,false))ch++;});logAudit('Saved planning week of '+window._planWeek+' ('+ch+' change'+(ch===1?'':'s')+')');toast(ch?(ch+' change'+(ch===1?'':'s')+' saved to master'):'Saved — no changes vs current',true);renderAdmin('planning');};
   const lc=document.getElementById('logClear');if(lc)lc.onclick=()=>{if(confirm('Clear the roster change history? (The schedule itself is not affected.)')){ROSTERLOG=[];saveAll();renderAdmin('planning');}};
   const ex=document.getElementById('expRoster');if(ex)ex.onclick=exportRoster;
   const pw=document.getElementById('planPrint');if(pw)pw.onclick=printWeek;
   return;
 }
 if(v==='requests'||v==='dashboard'){
   document.querySelectorAll('[data-appr]').forEach(b=>b.onclick=()=>approveReq(b.dataset.appr));
   document.querySelectorAll('[data-decl]').forEach(b=>b.onclick=()=>declineReq(b.dataset.decl));
   if(v==='dashboard'){document.querySelectorAll('[data-otname]').forEach(b=>b.onclick=()=>staffWeekModal(b.dataset.otname));return;}
   return;
 }
 if(v==='ot'){const w=document.getElementById('wSel');if(w){w.value=window._w||w.value;w.onchange=()=>{window._w=w.value;renderAdmin('ot');};}
   const e=document.getElementById('expOT');if(e)e.onclick=()=>exportWeek();
   const ep=document.getElementById('expPay');if(ep)ep.onclick=exportPayslips;}
 if(v==='leave'){const e=document.getElementById('expLeave');if(e)e.onclick=exportLeave;}
 if(v==='rates'){document.getElementById('saveRates').onclick=()=>{document.querySelectorAll('[data-f]').forEach(inp=>{const i=+inp.dataset.i,f=inp.dataset.f;staff[i][f]=(f==='rate'||f==='alEntitle')?(+inp.value||0):inp.value.trim();});saveAll();logAudit('Updated staff / rates / PINs / leave');toast('Saved',true);renderAdmin('rates');};
   document.querySelectorAll('[data-auto]').forEach(b=>b.onclick=()=>{const i=+b.dataset.auto;const ji=document.querySelector('[data-f="join"][data-i="'+i+'"]');const sug=entitleFromJoin(ji?ji.value:staff[i].join);if(sug!=null){const ei=document.querySelector('[data-f="alEntitle"][data-i="'+i+'"]');if(ei)ei.value=sug;}});
   document.getElementById('addStaff').onclick=()=>{staff.push({name:'New Staff',role:'PCA',rate:14,pin:'0000',join:'',alEntitle:10});saveAll();renderAdmin('rates');};}
 if(v==='records'){const byKey=k=>records.find(x=>(x.inISO+'~'+x.name)===k);
   document.querySelectorAll('[data-rec]').forEach(inp=>inp.onchange=()=>{const r=byKey(inp.dataset.rec);if(!r)return;
     const val=inp.value?new Date(inp.value).toISOString():null;if(inp.dataset.k==='in'&&val)r.inISO=val;if(inp.dataset.k==='out')r.outISO=val;if(r.autoOut){r.autoOut=false;r.noOT=false;}saveAll();logAudit('Edited '+inp.dataset.k+' time: '+r.name);renderAdmin('records');});
   document.querySelectorAll('[data-adj]').forEach(b=>b.onclick=()=>{const p=b.dataset.adj.split('|');const r=byKey(p[0]);if(!r)return;
     if(p[1]==='in')r.inISO=nudge(r.inISO,+p[2]);else if(r.outISO)r.outISO=nudge(r.outISO,+p[2]);saveAll();logAudit('Adjusted '+p[1]+' '+p[2]+'min: '+r.name);renderAdmin('records');});
   document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{const r=byKey(b.dataset.del);records=records.filter(x=>(x.inISO+'~'+x.name)!==b.dataset.del);saveAll();logAudit('Deleted punch: '+(r?r.name:''));renderAdmin('records');});
   document.getElementById('addRec').onclick=()=>{const nm=document.getElementById('mName').value,ti=document.getElementById('mIn').value,to=document.getElementById('mOut').value;
     if(!ti){toast('Pick time-in',false);return;}records.push({name:nm,inISO:new Date(ti).toISOString(),outISO:to?new Date(to).toISOString():null,sched:'',lateMin:null});saveAll();logAudit('Manual/override punch: '+nm);renderAdmin('records');toast('Added',true);};
   document.getElementById('coAll').onclick=()=>{let n=0;records.forEach(r=>{if(!r.outISO){r.outISO=NOW().toISOString();n++;}});saveAll();logAudit('Bulk clocked out '+n+' open shifts');renderAdmin('records');toast(n+' open shifts clocked out',n>0);};
   document.getElementById('roundAll').onclick=()=>{if(!settings.rounding){toast('Set a rounding step in Settings',false);return;}records.forEach(r=>{r.inISO=roundISO(r.inISO,settings.rounding);if(r.outISO)r.outISO=roundISO(r.outISO,settings.rounding);});saveAll();logAudit('Rounded all punches to '+settings.rounding+'min');renderAdmin('records');toast('Rounded to '+settings.rounding+' min',true);};
   document.getElementById('expAll').onclick=exportAll;}
 if(v==='settings'){document.getElementById('saveSet').onclick=()=>{const g=id=>document.getElementById(id);
     settings.otBasis=g('setBasis').value;settings.otThreshold=+g('setThr').value||48;settings.dailyThreshold=+g('setDaily').value||12;
     settings.otMult=+g('setMult').value||1.5;settings.phMult=+g('setPH').value||2;settings.breakMin=+g('setBrk').value||0;settings.breakAfter=+g('setBrkAft').value||8;
     settings.rounding=+g('setRound').value||0;settings.grace=+g('setGrace').value||5;settings.advanceDays=+g('setAdv').value||14;settings.shortNotice=+g('setShort').value||2;settings.currency=g('setCur').value.trim()||'RM';
     settings.amIn=g('setAmIn').value||'07:00';settings.amOut=g('setAmOut').value||'19:00';settings.nIn=g('setNIn').value||'19:00';settings.nOut=g('setNOut').value||'07:00';settings.clockOffset=+g('setOff').value||0;
     settings.managerPin=g('setMgr').value.trim()||'1234';settings.adminPin=g('setAdmin').value.trim()||'9999';saveAll();logAudit('Updated settings');toast('Settings saved',true);renderAdmin('settings');};
   const offAdj=m=>{const el=document.getElementById('setOff');el.value=(+el.value||0)+m;};
   document.getElementById('offM').onclick=()=>offAdj(-1);document.getElementById('offP').onclick=()=>offAdj(1);
   document.getElementById('offZ').onclick=()=>{document.getElementById('setOff').value=0;};
   document.getElementById('wipe').onclick=()=>{if(confirm('Delete ALL punch records?')){records=[];saveAll();toast('Cleared',false);renderAdmin('settings');}};}
}
function viewDashboard(){
 const today=todayISO();const now=NOW();
 const onNow=records.filter(r=>!r.outISO);
 const lateToday=records.filter(r=>recDateISO(r)===today&&r.lateMin!=null&&r.lateMin>settings.grace);
 let absentToday=[];
 activeStaff().forEach(s=>{if(isAbsent(s.name,today))absentToday.push(dispName(s));});
 const pend=requests.filter(r=>r.status==='pending');
 const wk=mondayKey(now).getTime();
 const lateWk=records.filter(r=>r.lateMin!=null&&r.lateMin>settings.grace&&mondayKey(r.inISO).getTime()===wk).sort((a,b)=>new Date(b.inISO)-new Date(a.inISO));
 const lateRows=lateWk.map(r=>`<tr style="background:var(--red-l)"><td><b>${r.name}</b></td><td class="mono">${fmtDT(r.inISO)}</td><td class="mono">${schedFor(r.name,recDateISO(r))||'—'}</td><td><span class="badge b-late">late ${r.lateMin} min</span></td></tr>`).join('')||'<tr><td colspan="4" style="color:var(--muted)">No late arrivals this week.</td></tr>';
 const typeTag=t=>{const c=(t==='MC'||t==='EL')?'b-mc':(t==='AL'?'b-al':(t==='Other'?'b-upl':'b-off'));return `<span class="badge ${c}">${reqType(t)}</span>`;};
 const pendRows=pend.slice(0,10).map(r=>{const da=Math.ceil((new Date(r.from)-new Date(today))/864e5);
   return `<tr><td><b>${r.name}</b></td><td>${typeTag(r.type)}</td><td class="mono">${r.from===r.to?fmtDate(r.from):fmtDate(r.from)+'→'+fmtDate(r.to)}</td>
     <td style="color:var(--muted)">${r.note||(da>=0?da+'d ahead':'')}</td>
     <td><button class="btn" style="padding:5px 10px" data-appr="${r.id}">Approve</button> <button class="btn ghost sm" data-decl="${r.id}">Decline</button></td></tr>`;}).join('')||'<tr><td colspan="5" style="color:var(--muted)">No pending tasks 🎉</td></tr>';
 /* on-duty today, split by floor & shift */
 const duty={1:{day:[],night:[]},2:{day:[],night:[]}};
 activeStaff().forEach(s=>{const c=schedFor(s.name,today);if(!c||isLeave(c))return;duty[floorOf(s.name,today)][c==='N'?'night':'day'].push(dispName(s));});
 const cellList=arr=>arr.length?arr.map(n=>`<span class="duty">${n}</span>`).join(' '):'<span style="color:var(--muted)">—</span>';
 const cov=`<table><thead><tr><th>Shift</th><th>1st floor <span class="fbadge f1">blue</span></th><th>2nd floor <span class="fbadge f2">pink</span></th></tr></thead><tbody>
   <tr><td><b>Day / AM</b></td><td class="f1">${cellList(duty[1].day)} <span class="mono" style="color:var(--muted)">(${duty[1].day.length})</span></td><td class="f2">${cellList(duty[2].day)} <span class="mono" style="color:var(--muted)">(${duty[2].day.length})</span></td></tr>
   <tr><td><b>Night</b></td><td class="f1">${cellList(duty[1].night)} <span class="mono" style="color:var(--muted)">(${duty[1].night.length})</span></td><td class="f2">${cellList(duty[2].night)} <span class="mono" style="color:var(--muted)">(${duty[2].night.length})</span></td></tr></tbody></table>`;
 /* live — who is clocked in right now */
 const onRows=onNow.map(r=>{const f=floorOf(r.name,recDateISO(r));const hrs=(now-new Date(r.inISO))/3600000;const e=expected(schedFor(r.name,recDateISO(r)));const ovr=e&&hrs>(()=>{const w=shiftWindow(r.name,recDateISO(r));return w?(w.end-w.start)/3600000:99;})();
   return `<tr><td><b>${r.name}</b></td><td><span class="fbadge ${f===2?'f2':'f1'}">${f===2?'2F':'1F'}</span></td><td class="mono">${fmtDT(r.inISO)}</td><td class="mono" style="font-weight:700;color:${ovr?'var(--amber)':'var(--ink)'}">${hrs.toFixed(1)}h${ovr?' ⏰':''}</td><td class="mono" style="color:var(--muted)">${e?e.out:'—'}</td></tr>`;}).join('')||'<tr><td colspan="5" style="color:var(--muted)">Nobody is clocked in right now.</td></tr>';
 /* auto OT this week */
 const wkRecs=records.filter(r=>r.outISO&&mondayKey(r.inISO).getTime()===wk);const byN={};wkRecs.forEach(r=>{(byN[r.name]=byN[r.name]||[]).push(r);});
 const otBasisTxt=settings.otBasis==='daily'?`daily &gt;${settings.dailyThreshold}h`:`weekly &gt;${settings.otThreshold}h`;
 const wkStats=activeStaff().map(s=>{const rs=byN[s.name]||[];const h=rs.reduce((a,r)=>a+hours(r),0);
   let ot;if(settings.otBasis==='daily')ot=rs.reduce((a,r)=>a+(r.noOT?0:Math.max(0,hours(r)-settings.dailyThreshold)),0);else ot=Math.max(0,rs.filter(r=>!r.noOT).reduce((a,r)=>a+hours(r),0)-settings.otThreshold);
   return {name:dispName(s),key:s.name,h,ot};}).filter(x=>x.h>0).sort((a,b)=>b.ot-a.ot||b.h-a.h);
 const totalOT=wkStats.reduce((a,x)=>a+x.ot,0);
 const otRows=wkStats.map(x=>`<tr><td><button class="linklike" data-otname="${x.key}">${x.name}</button></td><td class="mono">${x.h.toFixed(1)}h</td><td>${x.ot>0?`<span class="badge b-late">${x.ot.toFixed(1)}h OT</span>`:'<span style="color:var(--muted)">—</span>'}</td></tr>`).join('')||'<tr><td colspan="3" style="color:var(--muted)">No completed shifts yet this week.</td></tr>';
 return `<div class="panel"><h3>Dashboard — ${now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</h3>
  <div class="kpi">
   <div class="k"><div class="l">On shift now</div><div class="v" style="color:var(--green)">${onNow.length}</div></div>
   <div class="k"><div class="l">Late today</div><div class="v" style="color:${lateToday.length?'var(--red)':'var(--ink)'}">${lateToday.length}</div></div>
   <div class="k"><div class="l">Absent so far</div><div class="v" style="color:${absentToday.length?'var(--red)':'var(--ink)'}">${absentToday.length}</div></div>
   <div class="k"><div class="l">Forms pending</div><div class="v" style="color:${pend.length?'var(--amber)':'var(--ink)'}">${pend.length}</div></div>
   <div class="k"><div class="l">OT this week</div><div class="v" style="color:${totalOT>0?'var(--amber)':'var(--ink)'}">${totalOT.toFixed(1)}<span style="font-size:13px">h</span></div></div></div>
  ${absentToday.length?`<p class="note" style="color:var(--red);font-weight:600">Absent today (scheduled, not clocked in): ${absentToday.join(', ')}</p>`:''}
  <div class="adminH4">Clocked in right now</div>
  <table><thead><tr><th>Name</th><th>Floor</th><th>In at</th><th>Hours so far</th><th>Sched. out</th></tr></thead><tbody>${onRows}</tbody></table>
  <div class="adminH4">On duty today — by floor &amp; shift</div>
  ${cov}
  <div class="adminH4">Pending tasks — forms to approve ${pend.length?`<span class="tabnotif">${pend.length}</span>`:''}</div>
  <table><thead><tr><th>Name</th><th>Type</th><th>Date(s)</th><th>Note</th><th>Action</th></tr></thead><tbody>${pendRows}</tbody></table>
  <div class="adminH4">Hours &amp; auto-OT this week <span style="font-weight:400;color:var(--muted);font-size:12px">(${otBasisTxt}; auto clock-outs excluded)</span></div>
  <table><thead><tr><th>Name</th><th>Hours</th><th>Overtime</th></tr></thead><tbody>${otRows}</tbody></table>
  <div class="adminH4">Late arrivals this week</div>
  <table><thead><tr><th>Name</th><th>Clocked in</th><th>Shift</th><th>Late by</th></tr></thead><tbody>${lateRows}</tbody></table></div>`;
}

function isoOf(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function reqType(t){return {Off:'Day off',AL:'Annual leave',MC:'Medical leave',EL:'Emergency leave',Other:'Shift / swap / other'}[t]||t;}
function approveReq(id){const r=requests.find(x=>x.id===id);if(!r||r.status!=='pending')return;
  if(r.type==='AL'){const s=staff.find(x=>x.name===r.name);const days=reqDates(r).length;const st=alStats(s);
    if(days>st.bal&&!confirm(r.name+' has only '+st.bal+' AL day(s) left (entitlement '+st.ent+'). Approve anyway?'))return;}
  r.status='approved';
  if(r.type!=='Other'){const code=r.type==='Off'?'L':r.type;reqDates(r).forEach(iso=>{ROSTER[iso]=ROSTER[iso]||{};ROSTER[iso][r.name]=code;});}
  saveAll();logAudit('Approved '+r.name+' '+reqType(r.type)+' '+r.from+(r.to!==r.from?'→'+r.to:''));updateNotif();toast('Approved'+(r.type!=='Other'?' & written to roster':''),true);renderAdmin(window._adminTab||'requests');}
function declineReq(id){const r=requests.find(x=>x.id===id);if(!r||r.status!=='pending')return;r.status='declined';saveAll();logAudit('Declined '+r.name+' '+reqType(r.type));updateNotif();renderAdmin(window._adminTab||'requests');}

function reqDates(r){const out=[];let d=new Date(r.from);const end=new Date(r.to);while(d<=end){out.push(isoOf(d));d.setDate(d.getDate()+1);}return out;}

     <label style="font-size:11.5px;color:var(--muted)">From</label><input type="date" id="rqFrom" value="${t}">
     <label style="font-size:11.5px;color:var(--muted)">To (optional, for a range)</label><input type="date" id="rqTo">
     <input type="text" id="rqNote" placeholder="Note (optional)">
     <div class="hint" style="margin:0">MC &amp; EL: at least ${settings.shortNotice} day(s) ahead. Other requests: at least ${settings.advanceDays} days ahead.</div>
     <button class="btn" id="rqSubmit">Submit request</button><button class="btn ghost sm" id="rqBack">Back</button></div>`;
 document.getElementById('rqSubmit').onclick=()=>{const from=document.getElementById('rqFrom').value;if(!from){toast('Pick a date',false);return;}
   const to=document.getElementById('rqTo').value||from;const type=document.getElementById('rqType').value;
   const daysAhead=Math.ceil((new Date(from)-new Date(todayISO()))/864e5);
   const need=(type==='MC'||type==='EL')?settings.shortNotice:settings.advanceDays;
   if(type!=='Other'&&daysAhead<need){toast('This needs at least '+need+' day(s) notice (this is '+(daysAhead<0?'in the past':daysAhead+' day(s) ahead')+')',false);return;}
   if(type==='AL'){const s=staff.find(x=>x.name===name);const days=Math.floor((new Date(to)-new Date(from))/864e5)+1;const st=alStats(s);if(days>st.bal){toast('Not enough annual-leave balance — '+st.bal+' day(s) left of '+st.ent,false);return;}}
   requests.push({id:Date.now()+'',name,type,from,to,note:document.getElementById('rqNote').value.trim(),status:'pending',created:new Date().toISOString()});
   saveAll();logAudit('New '+reqType(type)+' request from '+name+' ('+from+(to!==from?'→'+to:'')+')');updateNotif();closeReq();toast('Request submitted — manager will be notified',true);};
 document.getElementById('rqBack').onclick=reqStep1;}
document.getElementById('reqBtn').onclick=openReqFlow;
document.getElementById('reqScrim').onclick=e=>{if(e.target.id==='reqScrim')closeReq();};
/* ---- profile photo: downscale to keep storage small ---- */
let payAuth=false;
function fileToData(file,cb){const r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(file);}
function authPayslips(cb){if(payAuth)return cb();const pin=prompt('Payslips are private & confidential. Enter Admin or Manager PIN to view:');
  if(pin&&(pin===settings.adminPin||pin===settings.managerPin)){payAuth=true;logAudit('Authorized confidential payslip access');cb();}
  else if(pin!=null)toast('Wrong PIN',false);}
function openPayslip(p){const w=window.open('','_blank');if(w&&w.document){const pdf=(p.type||'').includes('pdf');
    w.document.write(`<title>${p.label||'Payslip'}</title><body style="margin:0">${pdf?`<iframe src="${p.data}" style="border:0;width:100vw;height:100vh"></iframe>`:`<img src="${p.data}" style="max-width:100%">`}`);}
  else downloadData(p);}
function downloadData(p){const a=document.createElement('a');a.href=p.data;a.download=(p.label||'payslip')+((p.type||'').includes('pdf')?'.pdf':'.jpg');document.body.appendChild(a);a.click();a.remove();}
function downscalePhoto(file,cb){const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{
  const max=256;let{width:w,height:h}=img;const sc=Math.min(max/w,max/h,1);w=Math.round(w*sc);h=Math.round(h*sc);
  const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
  cb(c.toDataURL('image/jpeg',0.82));};img.src=r.result;};r.readAsDataURL(file);}
/* ---- staff self photo upload (PIN protected) ---- */
function openPhotoFlow(){photoStep1();document.getElementById('reqScrim').classList.add('show');}
function photoStep1(){document.getElementById('reqBody').innerHTML=`<h3>Update my photo</h3><div class="sub">Verify it's you</div>
   <div style="margin-top:18px;display:grid;gap:10px"><select id="phName">${staff.map(s=>`<option value="${s.name}">${dispName(s)}</option>`).join('')}</select>
     <input type="password" id="phPin" maxlength="4" placeholder="Your 4-digit PIN" class="mono" style="text-align:center;letter-spacing:.3em">
     <button class="btn" id="phGo">Continue</button><button class="btn ghost sm" id="phCancel">Cancel</button></div>`;
 document.getElementById('phGo').onclick=()=>{const s=staff.find(x=>x.name===document.getElementById('phName').value);
   if(!s||s.pin!==document.getElementById('phPin').value){toast('Wrong PIN',false);return;}photoStep2(s);};
 document.getElementById('phCancel').onclick=closeReq;}
function photoStep2(s){const cur=s.photo?`<div class="avatarLg" style="background-image:url('${s.photo}')"></div>`:`<div class="avatarLg">${initials(s)}</div>`;
 document.getElementById('reqBody').innerHTML=`<h3>${dispName(s)}</h3><div class="sub">Choose a clear face photo</div>
   <div style="display:grid;place-items:center;margin:16px 0">${cur}</div>
   <div style="display:grid;gap:10px"><input type="file" accept="image/*" id="phFile">
     <button class="btn ghost sm" id="phRemove">Remove photo</button><button class="btn ghost sm" id="phBack">Done</button></div>`;
 document.getElementById('phFile').onchange=e=>{const f=e.target.files[0];if(!f)return;downscalePhoto(f,data=>{s.photo=data;saveAll();logAudit('Photo updated: '+dispName(s));toast('Photo saved',true);photoStep2(s);renderGrid();});};
 document.getElementById('phRemove').onclick=()=>{s.photo='';saveAll();toast('Photo removed',false);photoStep2(s);renderGrid();};
 document.getElementById('phBack').onclick=closeReq;}
document.getElementById('photoBtn').onclick=openPhotoFlow;
/* ---- staff self-service: view own payslips (PIN protected, own only) ---- */
function openMyPay(){myPayStep1();document.getElementById('reqScrim').classList.add('show');}
function myPayStep1(){document.getElementById('reqBody').innerHTML=`<h3>My payslips</h3><div class="sub">Private &amp; confidential — verify it's you</div>
   <div style="margin-top:18px;display:grid;gap:10px"><select id="myName">${staff.map(s=>`<option value="${s.name}">${dispName(s)}</option>`).join('')}</select>
     <input type="password" id="myPin" maxlength="4" placeholder="Your 4-digit PIN" class="mono" style="text-align:center;letter-spacing:.3em">
     <button class="btn" id="myGo">View</button><button class="btn ghost sm" id="myCancel">Cancel</button></div>`;
 document.getElementById('myGo').onclick=()=>{const s=staff.find(x=>x.name===document.getElementById('myName').value);
   if(!s||s.pin!==document.getElementById('myPin').value){toast('Wrong PIN',false);return;}myPayStep2(s);};
 document.getElementById('myCancel').onclick=closeReq;}
function myPayStep2(s){const ps=s.payslips||[];
 const rows=ps.length?ps.map((p,i)=>`<div class="row" style="justify-content:space-between;border:1px solid var(--line);border-radius:10px;padding:9px 11px"><span><b>${p.label||'Payslip'}</b><br><span style="font-size:11px;color:var(--muted)">${p.added||''}</span></span><span><button class="btn ghost sm" data-myview="${i}">View</button> <button class="btn ghost sm" data-mydl="${i}">Download</button></span></div>`).join(''):'<p style="color:var(--muted)">No payslips have been issued to you yet.</p>';
 document.getElementById('reqBody').innerHTML=`<h3>${dispName(s)}</h3><div class="sub">Your payslips</div><div style="margin-top:14px;display:grid;gap:8px">${rows}<button class="btn ghost sm" id="myDone">Done</button></div>`;
 document.querySelectorAll('[data-myview]').forEach(b=>b.onclick=()=>openPayslip(s.payslips[+b.dataset.myview]));
 document.querySelectorAll('[data-mydl]').forEach(b=>b.onclick=()=>downloadData(s.payslips[+b.dataset.mydl]));
 document.getElementById('myDone').onclick=closeReq;}
document.getElementById('payBtn').onclick=openMyPay;
/* ---- Employee profiles (admin) ---- */
const PROF_FIELDS=[['fullname','Full name'],['position','Position'],['floor','Home floor (1 or 2)'],['nric','NRIC'],['dob','Date of birth'],['gender','Gender'],['race','Race'],['religion','Religion'],['nat','Nationality'],['join','Date joined'],['academic','Highest academic'],['marital','Marital status'],['phone','Phone'],['addr','Address'],['epf','EPF no'],['perkeso','PERKESO no'],['health','Health status'],['blood','Blood group'],['chronic','Chronic disease'],['exp','Experience'],['emName','Emergency contact'],['emNo','Emergency no'],['alEntitle','AL entitlement'],['rate','Hourly rate'],['pin','PIN']];
function viewProfiles(){
 if(window._profSel==null)window._profSel=0;const s=staff[window._profSel]||staff[0];
 const list=staff.map((x,i)=>`<button class="btn ${i===window._profSel?'':'ghost'} sm" style="margin:0 4px 6px 0" data-prof="${i}">${dispName(x)}</button>`).join('');
 const av=s.photo?`<div class="avatarLg" style="background-image:url('${s.photo}')"></div>`:`<div class="avatarLg">${initials(s)}</div>`;
 const fields=PROF_FIELDS.map(([k,lbl])=>{const ty=k==='dob'||k==='join'?'date':(k==='rate'||k==='alEntitle'||k==='floor'?'number':'text');
   return `<tr><td style="width:160px;color:var(--muted)">${lbl}</td><td><input type="${ty}" value="${(s[k]??'')}" data-pf="${k}" style="width:100%"></td></tr>`;}).join('');
 const ps=s.payslips||[];
 const psRows=ps.map((p,i)=>`<tr><td>${p.label||'(payslip)'}</td><td class="mono" style="color:var(--muted)">${p.added||''}</td><td><button class="btn ghost sm" data-psview="${i}">View</button> <button class="btn ghost sm" data-psdl="${i}">Download</button> <button class="btn danger" data-psdel="${i}">Del</button></td></tr>`).join('')||'<tr><td colspan="3" style="color:var(--muted)">No payslips attached.</td></tr>';
 return `<div class="panel"><h3>Employee profiles</h3>
  <p class="hint">Full HR record per staff. Edit any field and Save. Staff upload their own photo from the clock screen; payslips below are confidential.</p>
  <div style="margin-bottom:12px">${list}</div>
  <div class="row" style="align-items:flex-start;gap:18px">
    <div style="text-align:center"><div style="display:grid;place-items:center;margin-bottom:8px">${av}</div>
      <input type="file" accept="image/*" id="profPhoto" style="width:150px;font-size:11px"></div>
    <div style="flex:1;min-width:260px"><table><tbody>${fields}</tbody></table></div></div>
  <div class="adminH4">🔒 Payslips — private &amp; confidential</div>
  <p class="hint">Attach PDF or image payslips for <b>${dispName(s)}</b>. Each staff can view only their <b>own</b> payslips from the clock screen after entering their PIN. Viewing here also needs Admin/Manager authorization. Keep files small — the app stores them on this device.</p>
  <div class="row" style="margin-bottom:8px"><input type="text" id="psLabel" placeholder="Label e.g. June 2026" style="width:auto"><input type="file" id="psFile" accept="application/pdf,image/*" style="width:auto"><button class="btn sm" id="psAdd">Attach payslip</button></div>
  <table><thead><tr><th>Payslip</th><th>Added</th><th>Action</th></tr></thead><tbody>${psRows}</tbody></table>
  <div class="row" style="margin-top:14px"><button class="btn" id="profSave">Save profile</button>
    <button class="btn ghost sm" id="profExport">Export all profiles (CSV)</button>
    <button class="btn ghost sm" id="profReload">Reload from employment record</button>
    <button class="btn ghost sm" id="profAdd">+ Add staff</button>
    <button class="btn danger" id="profDel">Delete this staff</button></div></div>`;
}

window.__kvPrefetch.then(function(){ autoCloseOpenPunches(); renderGrid(); updateNotif(); });
setInterval(()=>{if(autoCloseOpenPunches()&&!isAdmin)renderGrid();},300000);
