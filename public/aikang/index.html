<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIKANG Care Center — Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Spline+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#11242e;--paper:#f3f6f8;--card:#fff;--teal:#205d8a;--teal-d:#0a3354;--teal-l:#e2edf4;
    --clay:#c0653a;--clay-l:#f6e7df;--gold:#caa24a;--line:#d4dbe2;--muted:#5e6c79;
    --red:#b23a3a;--red-l:#f7e3e1;--green:#2f7d54;--green-l:#e2f0e7;--amber:#b7791f;--amber-l:#f7eccf;}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(circle at 12% 8%,#e6edf3 0,transparent 38%),radial-gradient(circle at 90% 0%,#e0ecf5 0,transparent 30%),var(--paper);
    font-family:'Spline Sans',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
  .serif{font-family:'Fraunces',serif;} .mono{font-family:'Spline Sans Mono',monospace;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;}
  .shadow-soft{box-shadow:0 1px 2px rgba(16,36,31,.04),0 8px 24px -12px rgba(16,36,31,.18);}
  .inp{border:1px solid var(--line);border-radius:9px;padding:7px 11px;background:#fff;font-size:14px;outline:none;width:100%;}
  .inp:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-l);}
  .btn{border-radius:9px;padding:8px 15px;font-weight:600;font-size:14px;cursor:pointer;border:1px solid transparent;transition:.15s;white-space:nowrap;}
  .btn-primary{background:var(--teal);color:#fff;} .btn-primary:hover{background:var(--teal-d);}
  .btn-ghost{background:#fff;border-color:var(--line);color:var(--ink);} .btn-ghost:hover{border-color:var(--teal);color:var(--teal);}
  .btn-clay{background:var(--clay);color:#fff;} .btn-clay:hover{filter:brightness(.93);}
  .chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;letter-spacing:.02em;display:inline-block;}
  table{border-collapse:collapse;width:100%;} 
  th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:left;font-weight:600;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;}
  td{padding:9px 12px;border-bottom:1px solid #efeadd;font-size:14px;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  ::-webkit-scrollbar{height:9px;width:9px;} ::-webkit-scrollbar-thumb{background:#cfc8b8;border-radius:9px;}
  .fade{animation:fade .3s ease both;} @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .navbtn{display:flex;align-items:center;gap:9px;padding:9px 13px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;color:var(--ink);border:1px solid transparent;width:100%;text-align:left;background:none;}
  .navbtn:hover{background:var(--teal-l);}
  .navbtn.on{background:var(--teal);color:#fff;}
  .navico{font-size:16px;width:20px;text-align:center;}
</style><style id="tw-shim">/* minimal utility shim (replaces Tailwind CDN for offline use) */
.flex{display:flex}.grid{display:grid}.block{display:block}.hidden{display:none}
.flex-col{flex-direction:column}.flex-wrap{flex-wrap:wrap}
.items-center{align-items:center}.items-end{align-items:flex-end}.items-start{align-items:flex-start}
.justify-between{justify-content:space-between}.justify-end{justify-content:flex-end}.justify-center{justify-content:center}
.gap-1{gap:.25rem}.gap-2{gap:.5rem}.gap-3{gap:.75rem}.gap-x-3{column-gap:.75rem}.gap-x-5{column-gap:1.25rem}
.mb-1{margin-bottom:.25rem}.mb-2{margin-bottom:.5rem}.mb-3{margin-bottom:.75rem}.mb-4{margin-bottom:1rem}.mb-5{margin-bottom:1.25rem}
.mt-1{margin-top:.25rem}.mt-2{margin-top:.5rem}.mt-3{margin-top:.75rem}.mt-4{margin-top:1rem}
.p-2{padding:.5rem}.p-3{padding:.75rem}.p-4{padding:1rem}.p-5{padding:1.25rem}.p-8{padding:2rem}.p-10{padding:2.5rem}
.px-1{padding-left:.25rem;padding-right:.25rem}.px-2{padding-left:.5rem;padding-right:.5rem}
.text-xs{font-size:.75rem}.text-sm{font-size:.875rem}
.text-center{text-align:center}.text-left{text-align:left}.text-right{text-align:right}
.uppercase{text-transform:uppercase}.tracking-wider{letter-spacing:.05em}
.font-medium{font-weight:500}.font-semibold{font-weight:600}
.overflow-x-auto{overflow-x:auto}
@media(min-width:768px){.md\:block{display:block}.md\:hidden{display:none}}

<script id="kv-bridge">
window.storage = {
  async get(k) {
    try {
      const r = await fetch('/api/kv?k=' + encodeURIComponent(k));
      if (!r.ok) return null;
      const d = await r.json();
      return d.value != null ? { value: d.value } : null;
    } catch (e) { return null; }
  },
  async set(k, v) {
    try {
      await fetch('/api/kv', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ k, v })
      });
    } catch (e) {}
  }
};
</script>
