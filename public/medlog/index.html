<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIKANG Medication Log & Weekly Balance — 1st Floor</title>
<style>
:root{
  --navy:#1F3864; --blue:#2F5597; --greyblue:#D9E2F0; --band:#DCE6F4; --band2:#CDDCEF;
  --yel:#FFFDE7; --line:#9AA7BC; --red:#C00000; --prn:#843C0C;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:"Aptos Narrow","Arial Narrow",Arial,sans-serif; background:#EEF1F6; color:#1a1a1a; font-size:13px;}

.topbar{background:var(--navy); color:#fff; padding:8px 14px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; position:sticky; top:0; z-index:50;}
.topbar h1{font-size:16px; letter-spacing:.5px; white-space:nowrap;}
.topbar .sub{font-size:11px; opacity:.75;}
.topbar .spacer{flex:1;}
.btn{background:#fff; color:var(--navy); border:none; padding:6px 12px; font-weight:bold; font-family:inherit; font-size:12px; cursor:pointer; border-radius:3px;}
.btn:hover{background:var(--greyblue);}
.btn.warn{background:#FBE5D6; color:var(--prn);}
.btn.small{padding:2px 8px; font-size:11px;}
.btn.add{background:#E2EFDA; color:#006100; border:1px solid #006100;}
.btn.del{background:#FFC7CE; color:#9C0006; border:1px solid #9C0006; padding:1px 6px; font-size:11px;}
.tabs{background:var(--blue); padding:6px 14px; display:flex; gap:5px; flex-wrap:wrap; position:sticky; top:44px; z-index:49;}
.tab{background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.35); padding:4px 10px; font-size:12px; font-weight:bold; cursor:pointer; border-radius:3px; font-family:inherit;}
.tab.active{background:#fff; color:var(--navy);}
.tab.master{background:#FFD966; color:var(--navy); border-color:#FFD966;}
.tab.master.active{background:#fff;}
.subtabs{display:flex; gap:6px; margin-bottom:10px;}
.subtab{background:var(--greyblue); color:var(--navy); border:1px solid var(--navy); padding:4px 14px; font-weight:bold; font-size:12px; cursor:pointer; font-family:inherit; border-radius:3px;}
.subtab.active{background:var(--navy); color:#fff;}

.page{max-width:1500px; margin:14px auto; background:#fff; padding:18px 22px 26px; box-shadow:0 1px 6px rgba(31,56,100,.18);}
.copyright{text-align:right; font-size:10px; color:#888; margin-bottom:4px;}

.titleblock{display:grid; grid-template-columns:1fr auto; border:2px solid var(--navy); margin-bottom:10px;}
.titleblock .tl{padding:8px 14px;}
.titleblock .tl .nm{font-size:15px; font-weight:bold; display:flex; align-items:center; gap:6px;}
.titleblock .tl .ttl{font-size:21px; font-weight:bold; color:var(--navy); letter-spacing:.5px; margin-top:2px;}
.titleblock .tr{border-left:2px solid var(--navy); display:grid; grid-template-rows:1fr 1fr; min-width:220px;}
.titleblock .tr div{padding:5px 12px; font-weight:bold; display:flex; align-items:center; gap:8px;}
.titleblock .tr div+div{border-top:1px solid var(--navy);}
.allergy{border:2px solid var(--red); padding:5px 12px; margin-bottom:10px; font-weight:bold; color:var(--red); display:flex; gap:8px; align-items:center;}

input.fill, .fill{background:var(--yel); border:1px solid var(--line); font-family:inherit; font-size:13px; padding:3px 6px; min-width:0;}
input.fill:focus{outline:2px solid var(--blue);}
input.medfield{background:#fff; border:1px dashed #B8C2D4; font-weight:bold;}
input.medfield:focus{outline:2px solid var(--blue); border-style:solid;}
input.namefield{font-size:14px; font-weight:bold; background:var(--yel); border:1px solid var(--line); padding:3px 6px;}

table{border-collapse:collapse; width:100%;}
th,td{border:1px solid var(--line); padding:4px 6px; text-align:center; vertical-align:middle;}
thead th{background:var(--blue); color:#fff; font-size:11.5px; border:1px solid var(--navy);}
thead tr.wk th{font-size:10.5px;}
th.wkhdr{background:var(--band); color:var(--navy); border-color:var(--navy);}
th.wkhdr.alt{background:var(--band2);}
td.med{text-align:left; min-width:150px;}
td.notes{text-align:left; font-size:11px; color:#444;}
td.calc{font-weight:bold; background:#F4F7FB;}
td.qtywk{font-weight:bold; color:var(--navy); background:#F4F7FB;}
tr.patientband td{background:var(--navy); color:#fff; text-align:left; font-size:13.5px; font-weight:bold; padding:5px 10px; border-color:var(--navy); letter-spacing:.3px;}
tr.patientband .rm input{width:64px; text-align:center; font-weight:bold; color:var(--navy); background:#FFD966; border:1px solid #FFD966;}
tr.patientband input.pname{background:rgba(255,255,255,.12); border:1px dashed rgba(255,255,255,.5); color:#fff; font-weight:bold; font-size:13.5px; width:240px; padding:2px 6px;}
td.status{font-weight:bold;}
td.status.ok{background:#E2EFDA; color:#006100;}
td.status.low{background:#FFF2CC; color:#9C6500;}
td.status.reorder{background:#FFC7CE; color:#9C0006;}
td.prnname input{color:var(--red);}
tr.prnhdr th{background:var(--prn); border-color:#5e2a08;}
tr.sectband td{background:var(--prn); color:#fff; font-weight:bold; letter-spacing:.5px; border-color:#5e2a08; padding:6px;}
td input{border:1px solid var(--line); background:var(--yel); font-family:inherit; font-size:13px; padding:2px 4px;}
td input.wide{width:100%; text-align:left;}
td.sign input{width:100%; text-align:center; font-size:11px;}
.addbar{margin:8px 0 4px; display:flex; gap:8px;}

.legend{display:grid; grid-template-columns:1.2fr .8fr 1.3fr; border:2px solid var(--navy); margin-top:14px; font-size:11px;}
.legend>div{padding:8px 10px;}
.legend>div+div{border-left:1px solid var(--navy);}
.legend h4{font-size:11.5px; color:var(--navy); margin-bottom:5px; text-transform:uppercase; letter-spacing:.4px;}
.legend table td{border:none; padding:1px 6px; text-align:left; font-size:11px;}
.legend .code{font-weight:bold; color:var(--red); width:34px; display:inline-block;}
.legend .swatch{display:inline-block; width:46px; padding:0 4px; border:1px solid #999; margin-right:6px; text-align:center; font-size:10px;}
.redink{grid-column:1/4; border-top:1px solid var(--navy); text-align:center; font-weight:bold; color:var(--red); padding:4px;}
.verfoot{text-align:right; font-size:10px; color:#888; margin-top:6px;}
.sig{margin-top:12px;}
.sig table th{background:var(--navy); border-color:var(--navy);}
.hint{background:var(--greyblue); border-left:4px solid var(--blue); padding:6px 10px; font-size:11.5px; color:#33405c; margin-bottom:10px; font-style:italic;}

@media print{
  body{background:#fff;}
  .topbar,.tabs,.noprint,.subtabs,.addbar,.btn{display:none !important;}
  .page{box-shadow:none; margin:0; max-width:none; padding:6px;}
  .view{display:none;}
  .view.printme{display:block !important; page-break-after:always;}
  .subview{display:none !important;}
  .subview.active{display:block !important;}
  input{border:none !important; background:transparent !important;}
  input.medfield{border:none !important;}
  body{font-size:11px;}
  th,td{padding:3px 4px;}
}
.view{display:none;}
.view.active{display:block;}
.subview{display:none;}
.subview.active{display:block;}
.savemsg{color:#FFD966; font-size:11px; font-weight:bold;}
</style>
</head>
<body>

<div class="topbar">
  <h1>AIKANG CARE CENTER BM — MEDICATION LOG &amp; WEEKLY BALANCE</h1>
  <span class="sub">1ST FLOOR &nbsp;•&nbsp; VER. IV &nbsp;•&nbsp; FRIDAY COUNTS &nbsp;•&nbsp; LINKED MASTER · LOG · CHART</span>
  <span class="spacer"></span>
  <span class="savemsg" id="savemsg"></span>
  <button class="btn add" onclick="addPatient()">➕ ADD PATIENT</button>
  <button class="btn" onclick="saveAll()">💾 SAVE</button>
  <button class="btn" onclick="window.print()">🖨 PRINT VIEW</button>
  <button class="btn" onclick="exportJSON()">⬇ BACKUP</button>
  <button class="btn warn" onclick="document.getElementById('importfile').click()">⬆ RESTORE</button>
  <input type="file" id="importfile" accept=".json" style="display:none" onchange="importJSON(this)">
</div>
<div class="tabs" id="tabs"></div>
<div id="views"></div>

<script id="kv-bridge">
(function(){
  var KEYS = ['aikang_medlog_v4','aikang_medlog_v3'];
  window.__kvPrefetch = (async function(){
    for(var k of KEYS){
      try{
        var r = await fetch('/api/kv?k='+encodeURIComponent(k));
        if(!r.ok) continue;
        var d = await r.json();
        if(d.value != null) localStorage.setItem(k, d.value);
      }catch(e){}
    }
  })();
  var _set = Storage.prototype.setItem;
  Storage.prototype.setItem = function(k,v){
    _set.call(this,k,v);
    if(KEYS.indexOf(k)>=0){
      fetch('/api/kv',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({k:k,v:v})}).catch(function(){});
    }
  };
})();
</script>

let NEXTUID = 127;
const WEEKS = 5;
const SKEY = 'aikang_medlog_v4';
const V3KEY = 'aikang_medlog_v3';
let MODEL = null;
let FIELDS = {};
let NEXTPID = 20;
let currentTab = 'master';

/* ================= storage ================= */
function persist(){
  try{
    localStorage.setItem(SKEY, JSON.stringify({model:MODEL, fields:FIELDS, nextuid:NEXTUID, nextpid:NEXTPID}));
    return true;
  }catch(e){ return false; }
}
function loadStore(){
  try{
    const s = localStorage.getItem(SKEY);
    if(s){ const o = JSON.parse(s); MODEL = o.model; FIELDS = o.fields||{}; NEXTUID = o.nextuid||NEXTUID; NEXTPID = o.nextpid||NEXTPID; return; }
    const v3 = localStorage.getItem(V3KEY);
    if(v3){
      const o = JSON.parse(v3);
      MODEL = o.model; NEXTUID = o.nextuid||NEXTUID; NEXTPID = o.nextpid||NEXTPID;
      const of = o.fields||{};
      FIELDS = {};
      Object.keys(of).forEach(k=>{
        let m;
        if(m = k.match(/^L_bf_(u\d+)$/)) FIELDS['BF_'+m[1]] = of[k];
        else if(m = k.match(/^M_bf_(u\d+)$/)){ if(FIELDS['BF_'+m[1]]===undefined) FIELDS['BF_'+m[1]] = of[k]; }
        else if(m = k.match(/^L_in(\d)_(u\d+)$/)) FIELDS['W'+m[1]+'_in_'+m[2]] = of[k];
        else if(m = k.match(/^L_us(\d)_(u\d+)$/)) FIELDS['W'+m[1]+'_us_'+m[2]] = of[k];
        else if(m = k.match(/^M_in_(u\d+)$/)){ if(FIELDS['W1_in_'+m[1]]===undefined) FIELDS['W1_in_'+m[1]] = of[k]; }
        else if(m = k.match(/^M_us_(u\d+)$/)){ if(FIELDS['W1_us_'+m[1]]===undefined) FIELDS['W1_us_'+m[1]] = of[k]; }
        else if(m = k.match(/^M_rk_(u\d+)$/)) FIELDS['RK_'+m[1]] = of[k];
        else if(m = k.match(/^L_rk_(u\d+)$/)){ if(FIELDS['RK_'+m[1]]===undefined) FIELDS['RK_'+m[1]] = of[k]; }
        else FIELDS[k] = of[k];
      });
      persist(); return;
    }
    MODEL = JSON.parse(JSON.stringify(SEED));
  }catch(e){ MODEL = JSON.parse(JSON.stringify(SEED)); FIELDS = {}; }
}

/* ---- Friday week dates ---- */
function wk1Friday(){
  if(FIELDS._wk1fri) return new Date(FIELDS._wk1fri + 'T00:00:00');
  const d = new Date(); d.setHours(0,0,0,0);
  const off = (5 - d.getDay() + 7) % 7;   // next Friday (today if Friday)
  d.setDate(d.getDate() + off);
  return d;
}
function fridayStr(w, long){
  const d = new Date(wk1Friday()); d.setDate(d.getDate() + 7*(w-1));
  const dd = String(d.getDate()).padStart(2,'0'), mm = String(d.getMonth()+1).padStart(2,'0');
  return long ? dd+'/'+mm+'/'+String(d.getFullYear()).slice(2) : dd+'/'+mm;
}
function wk1ISO(){ const d = wk1Friday(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function setWk1(inp){ FIELDS._wk1fri = inp.value; persist(); renderAll(currentTab); }
function activeWeek(){ const w = parseInt(FIELDS._aw); return (w>=1 && w<=WEEKS) ? w : 1; }
function setWeek(w){ FIELDS._aw = String(w); persist(); renderAll(currentTab); }
function syncInputs(){ document.querySelectorAll('input[data-k]').forEach(i=>{ FIELDS[i.dataset.k]=i.value; }); }
function saveAll(){
  syncInputs();
  const ok = persist();
  const m = document.getElementById('savemsg');
  m.textContent = ok ? '✓ SAVED ' + new Date().toLocaleTimeString() : '⚠ SAVED IN SESSION ONLY';
  setTimeout(()=>m.textContent='', 4000);
}
function exportJSON(){
  syncInputs();
  const blob = new Blob([JSON.stringify({model:MODEL, fields:FIELDS, nextuid:NEXTUID},null,1)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'AIKANG_MEDLOG_BACKUP_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importJSON(inp){
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e=>{
    try{
      const o = JSON.parse(e.target.result);
      if(o.model){ MODEL=o.model; FIELDS=o.fields||{}; NEXTUID=o.nextuid||NEXTUID; }
      else { FIELDS=o; } // v1 backup: fields only
      persist(); renderAll(); alert('Restored.');
    }catch(err){ alert('Invalid backup file.'); }
  };
  r.readAsText(f); inp.value='';
}

/* ================= helpers ================= */
const num = v => { const n = parseFloat(v); return isNaN(n)?0:n; };
const blank = v => v===undefined || v===null || String(v).trim()==='';
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
function fld(key, cls, w, ph){
  const v = FIELDS[key]!==undefined ? FIELDS[key] : '';
  return `<input class="fill ${cls||''}" data-k="${key}" value="${esc(v)}" style="width:${w||'54px'}" placeholder="${ph||''}" oninput="onField(this)">`;
}
function mfld(uid, field, w, isPrn, cls){
  const m = findMed(uid); const v = m ? (m[field]===undefined?'':m[field]) : '';
  return `<input class="medfield ${cls||''}" data-m="${uid}:${field}" value="${esc(v)}" style="width:${w||'70px'}" oninput="onMedField(this)">`;
}
function findMed(uid){
  for(const p of MODEL){ for(const m of p.meds) if(m.uid===uid) return m; for(const m of p.prn) if(m.uid===uid) return m; }
  return null;
}
function onField(i){
  FIELDS[i.dataset.k] = i.value;
  document.querySelectorAll(`input[data-k="${i.dataset.k}"]`).forEach(x=>{ if(x!==i) x.value = i.value; });
  recalcAll();
}
function onMedField(i){
  const [uid, field] = i.dataset.m.split(':');
  const m = findMed(uid); if(!m) return;
  m[field] = i.value;
  // mirror to twin inputs in other views
  document.querySelectorAll(`input[data-m="${uid}:${field}"]`).forEach(x=>{ if(x!==i) x.value = i.value; });
  recalcAll();
}
function onPatient(i){
  const [pid, field] = i.dataset.p.split(':');
  const p = MODEL.find(x=>x.pid===pid); if(!p) return;
  p[field] = i.value;
  document.querySelectorAll(`input[data-p="${pid}:${field}"]`).forEach(x=>{ if(x!==i) x.value = i.value; });
  // update tab label
  const t = document.querySelector(`.tab[data-v="${pid}"]`);
  if(t) t.textContent = (p.room||'?') + (p.name?' '+p.name.split(' ')[0]:'');
}
function pfld(p, field, cls, w, ph){
  return `<input class="${cls}" data-p="${p.pid}:${field}" value="${esc(p[field]||'')}" style="width:${w||'auto'}" placeholder="${ph||''}" oninput="onPatient(this)">`;
}

/* ================= add / delete ================= */
function addMed(pid, isPrn){
  const p = MODEL.find(x=>x.pid===pid); if(!p) return;
  const m = isPrn
    ? {uid:'u'+(NEXTUID++), name:'', dose:'', freq:'PRN', indication:'', max:''}
    : {uid:'u'+(NEXTUID++), name:'', dose:'', freq:'', times:'', notes:'', upd:'', dpw:''};
  (isPrn ? p.prn : p.meds).push(m);
  persist(); renderAll(pid);
}
function delMed(pid, uid){
  const p = MODEL.find(x=>x.pid===pid); if(!p) return;
  const m = findMed(uid);
  if(!confirm('DELETE medication "'+(m&&m.name?m.name:'(blank)')+'" for '+(p.name||p.room)+'?\nThis removes it from MASTER, LOG and CHART.')) return;
  p.meds = p.meds.filter(x=>x.uid!==uid);
  p.prn  = p.prn.filter(x=>x.uid!==uid);
  Object.keys(FIELDS).forEach(k=>{ if(k.endsWith('_'+uid)) delete FIELDS[k]; });
  persist(); renderAll(pid==='master'?'master':pid);
}

/* ================= patient add / delete ================= */
function addPatient(){
  const room = prompt('NEW PATIENT — enter ROOM NO (e.g. 103B):');
  if(room===null) return;
  const name = prompt('Enter PATIENT NAME:') || '';
  const p = {pid:'P'+(NEXTPID++), sheet:'', room:(room||'').toUpperCase().trim(), name:name.toUpperCase().trim(), meds:[], prn:[]};
  MODEL.push(p);
  persist(); renderAll(p.pid);
}
function delPatient(pid){
  const p = MODEL.find(x=>x.pid===pid); if(!p) return;
  const label = (p.room||'?') + ' ' + (p.name||'(unnamed)');
  if(!confirm('DELETE PATIENT ' + label + '?\nThis permanently removes the patient and ALL their medications, balances and chart records from MASTER, LOG and CHART.')) return;
  if(!confirm('FINAL CONFIRMATION — delete ' + label + ' and all records?')) return;
  const uids = [...p.meds, ...p.prn].map(m=>m.uid);
  MODEL = MODEL.filter(x=>x.pid!==pid);
  Object.keys(FIELDS).forEach(k=>{
    if(k.endsWith('_'+pid)) delete FIELDS[k];
    uids.forEach(u=>{ if(k.endsWith('_'+u)) delete FIELDS[k]; });
  });
  persist(); renderAll('master');
}

/* ================= calc ================= */
function chainBal(u, through){
  // returns {bal, any} balance after week `through` (0 = just B/F)
  const bf = FIELDS['BF_'+u];
  let any = !blank(bf);
  let bal = num(bf);
  for(let w=1; w<=through; w++){
    const i = FIELDS['W'+w+'_in_'+u], s = FIELDS['W'+w+'_us_'+u];
    if(!blank(i) || !blank(s)) any = true;
    bal += num(i) - num(s);
  }
  return {bal:bal, any:any};
}

function recalcAll(){
  const AW = activeWeek();
  document.querySelectorAll('tr[data-row]').forEach(tr=>{
    const u = tr.dataset.row;
    const m = findMed(u); if(!m) return;
    const upd = parseFloat(m.upd), dpw = parseFloat(m.dpw);
    const qtywk = (!isNaN(upd) && !isNaN(dpw)) ? upd*dpw : NaN;
    const qtyCell = tr.querySelector('[data-cell="qtywk"]');
    if(qtyCell) qtyCell.textContent = isNaN(qtywk)?'':(+qtywk.toFixed(1));

    if(tr.dataset.kind==='M' || tr.dataset.kind==='MP'){
      const prev = chainBal(u, AW-1);
      const cur  = chainBal(u, AW);
      const bfCell = tr.querySelector('[data-cell="bfprev"]');
      if(bfCell) bfCell.textContent = prev.any ? +prev.bal.toFixed(1) : '';
      const balCell = tr.querySelector('[data-cell="bal"]');
      if(balCell) balCell.textContent = cur.any ? +cur.bal.toFixed(1) : '';
      const wkCell = tr.querySelector('[data-cell="wks"]'), stCell = tr.querySelector('[data-cell="st"]');
      if(wkCell && stCell){
        if(cur.any && !isNaN(qtywk) && qtywk>0){
          const wl = cur.bal/qtywk;
          wkCell.textContent = wl.toFixed(1);
          stCell.textContent = wl<2?'REORDER':(wl<4?'LOW':'OK');
          stCell.className = 'status ' + (wl<2?'reorder':(wl<4?'low':'ok'));
        } else { wkCell.textContent=''; stCell.textContent=''; stCell.className='status'; }
      }
    }
    if(tr.dataset.kind==='L'){
      for(let w=1; w<=WEEKS; w++){
        const cell = tr.querySelector(`[data-cell="wbal${w}"]`);
        if(!cell) continue;
        const r = chainBal(u, w);
        cell.textContent = r.any ? +r.bal.toFixed(1) : '';
      }
    }
  });
}

  document.querySelectorAll(`#v_${pid} .subview`).forEach(x=>x.classList.remove('active'));
  document.getElementById(`sv_${pid}_${s}`).classList.add('active');
  document.querySelectorAll(`#v_${pid} .subtab`).forEach(x=>x.classList.remove('active'));
  btn.classList.add('active');
}

window.__kvPrefetch.then(function(){ loadStore(); renderAll('master'); });
window.addEventListener('beforeunload', ()=>{ syncInputs(); persist(); });
</script>
</body>
